name: Build Tweak

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=~/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Build dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make

      - name: Find dylib
        run: |
          find . -name "*.dylib" 2>/dev/null
          find .theos -type f 2>/dev/null

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: UDIDAuth-dylib
          path: .theos/obj/UDIDAuth.dylib
          if-no-files-found: warn
