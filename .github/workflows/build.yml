name: Build Tweak

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Build dylib
        run: |
          export THEOS=~/theos
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v3
        with:
          name: UDIDAuth-dylib
          path: .theos/obj/debug/UDIDAuth.dylib
